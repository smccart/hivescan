<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HiveAgents</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none'%3E%3Crect width='24' height='24' rx='5' fill='%230d1117'/%3E%3Cpath d='M12 3L3 7.5l9 4.5 9-4.5L12 3z' stroke='%234ade80' stroke-width='1.75' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M3 16.5l9 4.5 9-4.5' stroke='%234ade80' stroke-width='1.75' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M3 12l9 4.5 9-4.5' stroke='%234ade80' stroke-width='1.75' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="repo-tabs"></div>
    <div id="app-body">
      <aside id="sidebar">
        <div id="logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
          <span>HiveAgents</span>
        </div>

        <div id="agent-list"></div>

        <div id="sidebar-footer">
          <div id="model-selector">
            <label for="model-select">Model</label>
            <select id="model-select"></select>
          </div>
          <button id="btn-permissions" class="footer-btn" title="Manage permissions">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
            Permissions
          </button>
          <button id="btn-start-all" class="footer-btn">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Start All
          </button>
          <button id="btn-stop-all" class="footer-btn footer-btn--danger">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
            Stop All
          </button>
        </div>
      </aside>

      <main id="main">
        <header id="agent-header">
          <div id="header-identity">
            <div id="header-color-bar"></div>
            <span id="header-dot"></span>
            <span id="header-name">Select an agent</span>
            <a id="header-port" target="_blank" rel="noopener"></a>
          </div>
          <div id="header-actions">
            <button id="btn-start" class="action-btn action-btn--start" title="Start agent">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Start
            </button>
            <button id="btn-stop" class="action-btn action-btn--stop" title="Stop agent">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
              Stop
            </button>
          </div>
        </header>

        <div id="terminal-container"></div>
      </main>
    </div>
  </div>

  <!-- Permissions modal -->
  <div id="permissions-modal" class="modal-overlay" style="display:none">
    <div class="modal-panel">
      <div class="modal-header">
        <span class="modal-title">Permissions</span>
        <button id="permissions-close" class="modal-close" title="Close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="perm-section">
          <label class="perm-label">Default Mode</label>
          <select id="perm-mode" class="perm-select">
            <option value="default">default</option>
            <option value="acceptEdits">acceptEdits</option>
            <option value="plan">plan</option>
            <option value="dontAsk">dontAsk</option>
            <option value="bypassPermissions">bypassPermissions</option>
          </select>
        </div>
        <div class="perm-section">
          <div class="perm-section-header">
            <label class="perm-label">Allow Rules</label>
            <button id="perm-add-allow" class="perm-add-btn" title="Add allow rule">+ Add</button>
          </div>
          <div id="perm-allow-list" class="perm-rule-list"></div>
        </div>
        <div class="perm-section">
          <div class="perm-section-header">
            <label class="perm-label">Deny Rules</label>
            <button id="perm-add-deny" class="perm-add-btn" title="Add deny rule">+ Add</button>
          </div>
          <div id="perm-deny-list" class="perm-rule-list"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="perm-save" class="perm-save-btn">Save</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="app.js"></script>
</body>
</html>
